<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 700" font-family="Helvetica,Arial,sans-serif" font-size="10">
  <style>
    .ent { fill:#fff; stroke:#0ea5e9; stroke-width:1.4; rx:6; ry:6; }
    .ent-h { fill:#0ea5e9; }
    .label { fill:#fff; font-weight:600; }
    .col { fill:#1e293b; }
    .col-pk { fill:#7c3aed; font-weight:600; }
    .col-fk { fill:#0ea5e9; font-weight:600; }
    .col-uk { fill:#16a34a; font-weight:600; }
    .rel { stroke:#94a3b8; stroke-width:1; fill:none; stroke-dasharray:4 3; }
  </style>
  <text x="380" y="22" text-anchor="middle" class="col" font-weight="600" font-size="14">Automation Layer · Entity-Relationship</text>
  <text x="380" y="40" text-anchor="middle" class="col" font-size="10">Purple = primary key · Green = unique key · Blue = foreign key</text>

  <!-- Row 1 -->
  <g transform="translate(20,55)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_threat_score_history</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col">score · severity</text>
    <text x="10" y="66" class="col">components · drivers (jsonb)</text>
    <text x="10" y="80" class="col">delta_24h</text>
    <text x="10" y="94" class="col">computed_at (idx desc)</text>
    <text x="10" y="108" class="col">append-only timeseries</text>
  </g>

  <g transform="translate(265,55)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_correlation_clusters</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">cluster_key (UNIQUE)</text>
    <text x="10" y="66" class="col">title · summary · severity</text>
    <text x="10" y="80" class="col">risk_score · signal_count</text>
    <text x="10" y="94" class="col">signals (jsonb) · tags[]</text>
    <text x="10" y="108" class="col">first_seen · last_seen</text>
  </g>

  <g transform="translate(510,55)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_briefings</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">(briefing_type, period_start)</text>
    <text x="10" y="66" class="col">headline · summary</text>
    <text x="10" y="80" class="col">threat_level · threat_score</text>
    <text x="10" y="94" class="col">highlights · top_clusters · metrics</text>
    <text x="10" y="108" class="col">recommendations · period_end</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(20,190)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_trend_metrics</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">(metric_key, bucket_date)</text>
    <text x="10" y="66" class="col">metric_label · value</text>
    <text x="10" y="80" class="col">delta_pct · is_emerging</text>
    <text x="10" y="94" class="col">metadata (jsonb)</text>
    <text x="10" y="108" class="col">captured_at</text>
  </g>

  <g transform="translate(265,190)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_metric_forecasts</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">(metric_key, forecast_date)</text>
    <text x="10" y="66" class="col">predicted · lower · upper</text>
    <text x="10" y="80" class="col">method (holt|hw|naive)</text>
    <text x="10" y="94" class="col">confidence · generated_at</text>
  </g>

  <g transform="translate(510,190)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_anomalies</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">(metric_key, bucket_date)</text>
    <text x="10" y="66" class="col">value · expected_value · z_score</text>
    <text x="10" y="80" class="col">severity · direction</text>
    <text x="10" y="94" class="col">explanation · caused_by (jsonb)</text>
  </g>

  <!-- Row 3 -->
  <g transform="translate(20,325)">
    <rect width="220" height="135" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_action_queue</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">action_key (sha256)</text>
    <text x="10" y="66" class="col">title · description · category</text>
    <text x="10" y="80" class="col">priority · severity · status</text>
    <text x="10" y="94" class="col">source_type · source_ref</text>
    <text x="10" y="108" class="col">suggested_steps · metadata</text>
    <text x="10" y="122" class="col">assigned_to · done_at · done_by</text>
  </g>

  <g transform="translate(265,325)">
    <rect width="220" height="100" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_action_comments</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-fk">action_id → intel_action_queue</text>
    <text x="10" y="66" class="col">author_id · author_name</text>
    <text x="10" y="80" class="col">body</text>
    <text x="10" y="94" class="col">created_at (idx desc)</text>
  </g>

  <g transform="translate(265,440)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_action_audit</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-fk">action_id → intel_action_queue</text>
    <text x="10" y="66" class="col">actor_id · actor_name</text>
    <text x="10" y="80" class="col">event · from_value · to_value</text>
    <text x="10" y="94" class="col">metadata (jsonb)</text>
    <text x="10" y="108" class="col">created_at</text>
  </g>

  <g transform="translate(510,325)">
    <rect width="220" height="100" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_geo_threat</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">(country, bucket_date)</text>
    <text x="10" y="66" class="col">ransomware_count · phishing_count · darknet_count</text>
    <text x="10" y="80" class="col">total_signals · risk_score</text>
    <text x="10" y="94" class="col">country_code · captured_at</text>
  </g>

  <g transform="translate(510,440)">
    <rect width="220" height="115" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_sector_risk</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col-uk">(sector, bucket_date)</text>
    <text x="10" y="66" class="col">ransomware_victims · phishing_targets</text>
    <text x="10" y="80" class="col">darknet_mentions · cve_relevance</text>
    <text x="10" y="94" class="col">risk_score · captured_at</text>
  </g>

  <!-- Row 4 -->
  <g transform="translate(20,475)">
    <rect width="220" height="100" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_automation_runs</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col">run_type · status · duration_ms</text>
    <text x="10" y="66" class="col">output (jsonb) · error</text>
    <text x="10" y="80" class="col">started_at · finished_at</text>
  </g>

  <g transform="translate(20,590)">
    <rect width="220" height="100" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_forecast_accuracy</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col">metric_key · method · horizon_days</text>
    <text x="10" y="66" class="col">mape · rmse · mae</text>
    <text x="10" y="80" class="col">sample_size · evaluated_at</text>
  </g>

  <g transform="translate(265,570)">
    <rect width="220" height="100" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_notification_log</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col">event · channel · target</text>
    <text x="10" y="66" class="col">payload (jsonb) · status · error</text>
    <text x="10" y="80" class="col">sent_at</text>
  </g>

  <g transform="translate(510,570)">
    <rect width="220" height="100" class="ent"/>
    <rect width="220" height="22" class="ent-h"/>
    <text x="110" y="16" text-anchor="middle" class="label">intel_cron_rate_log</text>
    <text x="10" y="38" class="col-pk">id</text>
    <text x="10" y="52" class="col">endpoint · client_ip</text>
    <text x="10" y="66" class="col">called_at</text>
    <text x="10" y="80" class="col">pruned hourly</text>
  </g>

  <!-- Relationships -->
  <line x1="375" y1="305" x2="375" y2="325" class="rel"/>
  <line x1="375" y1="425" x2="375" y2="440" class="rel"/>
</svg>
