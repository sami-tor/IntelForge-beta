<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Helvetica,Arial,sans-serif" font-size="11">
  <style>
    .tier { fill:#f8fafc; stroke:#cbd5e1; rx:8; ry:8; }
    .tier-app { fill:#e0f2fe; stroke:#0ea5e9; rx:8; ry:8; }
    .tier-data { fill:#fef3c7; stroke:#f59e0b; rx:8; ry:8; }
    .label { fill:#0f172a; font-weight:600; }
    .sub { fill:#475569; font-size:10px; }
    .arrow { stroke:#0ea5e9; stroke-width:1.4; fill:none; marker-end:url(#arr); }
    .arrow-back { stroke:#22c55e; stroke-width:1.4; fill:none; marker-end:url(#arrG); }
    .pill { fill:#fff; stroke:#cbd5e1; rx:4; ry:4; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
  </defs>
  <text x="380" y="22" text-anchor="middle" class="label" font-size="14">Deployment Topology</text>

  <!-- Client tier -->
  <rect x="20" y="50" width="200" height="80" class="tier"/>
  <text x="120" y="70" text-anchor="middle" class="label">Client tier</text>
  <rect x="40" y="80" width="160" height="34" class="pill"/>
  <text x="120" y="102" text-anchor="middle">Browser · EventSource SSE</text>

  <!-- Edge tier -->
  <rect x="240" y="50" width="200" height="80" class="tier"/>
  <text x="340" y="70" text-anchor="middle" class="label">Next.js edge</text>
  <rect x="260" y="80" width="160" height="34" class="pill"/>
  <text x="340" y="95" text-anchor="middle" font-size="10">middleware.ts</text>
  <text x="340" y="108" text-anchor="middle" class="sub">JWT verify · CSP · rate-limit</text>

  <!-- Cron tier -->
  <rect x="460" y="50" width="270" height="80" class="tier"/>
  <text x="595" y="70" text-anchor="middle" class="label">Scheduler (external)</text>
  <rect x="475" y="80" width="240" height="34" class="pill"/>
  <text x="595" y="102" text-anchor="middle" class="sub">Vercel Cron · GitHub Actions · k8s CronJob</text>

  <!-- App tier -->
  <rect x="60" y="160" width="640" height="160" class="tier-app"/>
  <text x="380" y="180" text-anchor="middle" class="label">Next.js app server (Node runtime)</text>

  <rect x="80" y="195" width="140" height="50" class="pill"/>
  <text x="150" y="215" text-anchor="middle" font-size="10">SSR pages</text>
  <text x="150" y="230" text-anchor="middle" class="sub">Command Center · queue · briefings</text>

  <rect x="240" y="195" width="140" height="50" class="pill"/>
  <text x="310" y="215" text-anchor="middle" font-size="10">REST endpoints</text>
  <text x="310" y="230" text-anchor="middle" class="sub">/api/intel/automation/*</text>

  <rect x="400" y="195" width="140" height="50" class="pill"/>
  <text x="470" y="215" text-anchor="middle" font-size="10">SSE stream</text>
  <text x="470" y="230" text-anchor="middle" class="sub">LISTEN/NOTIFY bridge</text>

  <rect x="560" y="195" width="120" height="50" class="pill"/>
  <text x="620" y="215" text-anchor="middle" font-size="10">Cron endpoints</text>
  <text x="620" y="230" text-anchor="middle" class="sub">CRON_SECRET</text>

  <rect x="80" y="260" width="200" height="50" class="pill"/>
  <text x="180" y="280" text-anchor="middle" font-size="10">Swagger UI</text>
  <text x="180" y="295" text-anchor="middle" class="sub">/api-docs · CDN bundle</text>

  <rect x="300" y="260" width="200" height="50" class="pill"/>
  <text x="400" y="280" text-anchor="middle" font-size="10">Hunt query builder</text>
  <text x="400" y="295" text-anchor="middle" class="sub">/intelligence/hunt · CSV export</text>

  <rect x="520" y="260" width="160" height="50" class="pill"/>
  <text x="600" y="280" text-anchor="middle" font-size="10">PDF export</text>
  <text x="600" y="295" text-anchor="middle" class="sub">/api/intel/.../export</text>

  <!-- Data tier -->
  <rect x="60" y="340" width="350" height="100" class="tier-data"/>
  <text x="235" y="360" text-anchor="middle" class="label">Data tier</text>
  <rect x="80" y="370" width="310" height="58" class="pill"/>
  <text x="235" y="390" text-anchor="middle" font-size="11">PostgreSQL 16</text>
  <text x="235" y="405" text-anchor="middle" class="sub">Docker: intelforge-postgres · port 5432</text>
  <text x="235" y="420" text-anchor="middle" class="sub">11 automation tables · pg_trgm · materialised views</text>

  <!-- Webhooks subscriber tier -->
  <rect x="430" y="340" width="270" height="100" class="tier"/>
  <text x="565" y="360" text-anchor="middle" class="label">Webhook subscribers</text>
  <rect x="450" y="370" width="80" height="32" class="pill"/>
  <text x="490" y="390" text-anchor="middle" font-size="10">Splunk / Sentinel</text>
  <rect x="540" y="370" width="60" height="32" class="pill"/>
  <text x="570" y="390" text-anchor="middle" font-size="10">Slack</text>
  <rect x="610" y="370" width="80" height="32" class="pill"/>
  <text x="650" y="390" text-anchor="middle" font-size="10">Custom</text>
  <text x="565" y="420" text-anchor="middle" class="sub">HMAC-signed alert.created events</text>

  <!-- arrows -->
  <line x1="220" y1="105" x2="240" y2="105" class="arrow"/>
  <line x1="440" y1="105" x2="460" y2="105" class="arrow"/>
  <line x1="120" y1="130" x2="180" y2="160" class="arrow"/>
  <line x1="340" y1="130" x2="380" y2="160" class="arrow"/>
  <line x1="595" y1="130" x2="500" y2="160" class="arrow"/>
  <line x1="380" y1="320" x2="235" y2="340" class="arrow"/>
  <line x1="380" y1="320" x2="565" y2="340" class="arrow"/>

  <text x="380" y="475" text-anchor="middle" class="sub">Production hardening: bearer auth + cron rate-limit + CSRF on PATCH + parameterised SQL + no upstream names in UI</text>
</svg>
