<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" font-family="Helvetica,Arial,sans-serif" font-size="11">
  <style>
    .state { fill:#fff; stroke:#0ea5e9; stroke-width:1.6; rx:6; ry:6; }
    .state-final { fill:#0f172a; stroke:#0f172a; }
    .label { fill:#0f172a; font-weight:600; }
    .label-final { fill:#fff; font-weight:600; }
    .arrow { stroke:#0ea5e9; stroke-width:1.4; fill:none; marker-end:url(#arr); }
    .sub { fill:#475569; font-size:10px; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <text x="360" y="22" text-anchor="middle" class="label" font-size="14">Action Queue — State Machine</text>

  <!-- Initial -->
  <circle cx="80" cy="160" r="6" fill="#0f172a"/>
  <line x1="86" y1="160" x2="135" y2="160" class="arrow"/>
  <text x="92" y="153" class="sub">pipeline emits</text>

  <!-- States -->
  <rect x="135" y="140" width="110" height="40" class="state"/>
  <text x="190" y="164" text-anchor="middle" class="label">open</text>

  <rect x="305" y="80" width="130" height="40" class="state"/>
  <text x="370" y="104" text-anchor="middle" class="label">in_progress</text>

  <rect x="305" y="200" width="130" height="40" class="state"/>
  <text x="370" y="224" text-anchor="middle" class="label">dismissed</text>

  <rect x="490" y="80" width="100" height="40" class="state"/>
  <text x="540" y="104" text-anchor="middle" class="label">done</text>

  <!-- Final state -->
  <circle cx="650" cy="160" r="9" class="state-final"/>
  <circle cx="650" cy="160" r="5" fill="#fff"/>

  <!-- Transitions -->
  <line x1="245" y1="155" x2="305" y2="105" class="arrow"/>
  <text x="260" y="120" class="sub">start</text>

  <line x1="245" y1="170" x2="305" y2="220" class="arrow"/>
  <text x="260" y="200" class="sub">dismiss</text>

  <line x1="435" y1="100" x2="490" y2="100" class="arrow"/>
  <text x="448" y="92" class="sub">complete</text>

  <line x1="370" y1="120" x2="190" y2="140" class="arrow"/>
  <text x="240" y="135" class="sub">reopen</text>

  <line x1="540" y1="120" x2="240" y2="140" class="arrow"/>
  <text x="370" y="138" class="sub">reopen</text>

  <line x1="370" y1="240" x2="190" y2="180" class="arrow"/>
  <text x="240" y="220" class="sub">reopen</text>

  <line x1="590" y1="100" x2="640" y2="155" class="arrow"/>
  <line x1="435" y1="220" x2="640" y2="160" class="arrow"/>

  <text x="80" y="305" class="sub">All transitions write to intel_action_audit (lib/intel/automation/action-queue.ts:229-271).</text>
  <text x="80" y="322" class="sub">Pipeline re-emission is idempotent on action_key (sha256). Re-emission updates priority &amp; steps,</text>
  <text x="80" y="339" class="sub">never overwrites status set by an analyst.</text>
</svg>
