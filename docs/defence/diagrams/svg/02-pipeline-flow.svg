<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" font-family="Helvetica,Arial,sans-serif" font-size="11">
  <style>
    .lane { stroke:#cbd5e1; stroke-width:1; fill:none; }
    .actor { fill:#0f172a; }
    .stage { fill:#e0f2fe; stroke:#0ea5e9; rx:6; ry:6; }
    .arrow { stroke:#0ea5e9; stroke-width:1.4; fill:none; marker-end:url(#arr); }
    .arrow-back { stroke:#22c55e; stroke-width:1.4; fill:none; marker-end:url(#arrG); }
    .label { fill:#0f172a; font-weight:600; }
    .sub { fill:#475569; font-size:10px; }
    .label-actor { fill:#fff; font-weight:600; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22c55e"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" class="label" font-size="14">Automation Pipeline — End-to-End Sequence</text>

  <!-- Actors -->
  <g>
    <rect x="40" y="40" width="100" height="26" rx="4" class="actor"/>
    <text x="90" y="58" text-anchor="middle" class="label-actor">Cron caller</text>
    <line x1="90" y1="66" x2="90" y2="690" class="lane"/>

    <rect x="170" y="40" width="100" height="26" rx="4" class="actor"/>
    <text x="220" y="58" text-anchor="middle" class="label-actor">cron route</text>
    <line x1="220" y1="66" x2="220" y2="690" class="lane"/>

    <rect x="300" y="40" width="100" height="26" rx="4" class="actor"/>
    <text x="350" y="58" text-anchor="middle" class="label-actor">orchestrator</text>
    <line x1="350" y1="66" x2="350" y2="690" class="lane"/>

    <rect x="430" y="40" width="100" height="26" rx="4" class="actor"/>
    <text x="480" y="58" text-anchor="middle" class="label-actor">stage modules</text>
    <line x1="480" y1="66" x2="480" y2="690" class="lane"/>

    <rect x="560" y="40" width="80" height="26" rx="4" class="actor"/>
    <text x="600" y="58" text-anchor="middle" class="label-actor">Postgres</text>
    <line x1="600" y1="66" x2="600" y2="690" class="lane"/>

    <rect x="660" y="40" width="80" height="26" rx="4" class="actor"/>
    <text x="700" y="58" text-anchor="middle" class="label-actor">webhooks</text>
    <line x1="700" y1="66" x2="700" y2="690" class="lane"/>
  </g>

  <!-- Sequence rows -->
  <g>
    <line x1="90" y1="90" x2="220" y2="90" class="arrow"/>
    <text x="155" y="84" text-anchor="middle" class="sub">POST + bearer</text>

    <line x1="220" y1="115" x2="220" y2="130" class="arrow"/>
    <text x="225" y="125" class="sub">isAuthorized() · rate-limit check</text>

    <line x1="220" y1="150" x2="350" y2="150" class="arrow"/>
    <text x="285" y="144" text-anchor="middle" class="sub">runFullAutomation()</text>

    <line x1="350" y1="170" x2="600" y2="170" class="arrow"/>
    <text x="475" y="164" text-anchor="middle" class="sub">INSERT automation_runs (running)</text>

    <rect x="290" y="190" width="320" height="58" class="stage"/>
    <text x="450" y="208" text-anchor="middle" class="label">Stage 1 · Threat Score</text>
    <text x="450" y="226" text-anchor="middle" class="sub">10 parallel COUNTs · scoreFromComponents() · INSERT history · NOTIFY score.updated</text>

    <rect x="290" y="260" width="320" height="58" class="stage"/>
    <text x="450" y="278" text-anchor="middle" class="label">Stage 2 · Correlation (incl. NLP aliases)</text>
    <text x="450" y="296" text-anchor="middle" class="sub">80 anchor CVEs · alias + fuzzy news match · UPSERT clusters · NOTIFY cluster.upserted</text>

    <rect x="290" y="330" width="320" height="58" class="stage"/>
    <text x="450" y="348" text-anchor="middle" class="label">Stage 3 · Trend capture</text>
    <text x="450" y="366" text-anchor="middle" class="sub">7 KPIs · per-bucket UPSERT · is_emerging flag</text>

    <rect x="290" y="400" width="320" height="58" class="stage"/>
    <text x="450" y="418" text-anchor="middle" class="label">Stage 4 · Forecast + Anomaly + Attribution + Backtest</text>
    <text x="450" y="436" text-anchor="middle" class="sub">Holt / HW · z-score · caused_by lookup · MAPE/RMSE/MAE per method</text>

    <rect x="290" y="470" width="320" height="58" class="stage"/>
    <text x="450" y="488" text-anchor="middle" class="label">Stage 5 · Geo + Sector index</text>
    <text x="450" y="506" text-anchor="middle" class="sub">3 GROUP BYs per dimension · UPSERT top 50 / 25</text>

    <rect x="290" y="540" width="320" height="58" class="stage"/>
    <text x="450" y="558" text-anchor="middle" class="label">Stage 6 · Action queue</text>
    <text x="450" y="576" text-anchor="middle" class="sub">SHA-256 action_key · category mapping · NOTIFY action.created</text>

    <rect x="290" y="610" width="320" height="58" class="stage"/>
    <text x="450" y="628" text-anchor="middle" class="label">Stage 7 · Briefing (deterministic, optional LLM)</text>
    <text x="450" y="646" text-anchor="middle" class="sub">narrative · UPSERT briefings · NOTIFY briefing.published</text>

    <line x1="600" y1="678" x2="700" y2="678" class="arrow"/>
    <text x="650" y="672" text-anchor="middle" class="sub">webhook</text>
    <line x1="350" y1="700" x2="220" y2="700" class="arrow-back"/>
    <text x="285" y="694" text-anchor="middle" class="sub">return JSON</text>
    <line x1="220" y1="715" x2="90" y2="715" class="arrow-back"/>
  </g>
</svg>
