<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" font-family="Helvetica,Arial,sans-serif" font-size="11">
  <style>
    .anchor { fill:#0ea5e9; stroke:#075985; stroke-width:1.5; rx:8; ry:8; }
    .signal { fill:#fff; stroke:#0ea5e9; stroke-width:1.2; rx:6; ry:6; }
    .table { fill:#f8fafc; stroke:#cbd5e1; rx:6; ry:6; }
    .cluster { fill:#fef3c7; stroke:#f59e0b; stroke-width:1.5; rx:8; ry:8; }
    .label-w { fill:#fff; font-weight:600; }
    .label { fill:#0f172a; font-weight:600; }
    .sub { fill:#475569; font-size:10px; }
    .arrow { stroke:#0ea5e9; stroke-width:1.2; fill:none; marker-end:url(#arr); }
    .arrow-out { stroke:#f59e0b; stroke-width:1.4; fill:none; marker-end:url(#arrO); }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <text x="380" y="22" text-anchor="middle" class="label" font-size="14">Deep Correlation — Multi-Anchor Engine (v2)</text>

  <!-- Source tables (left) -->
  <text x="20" y="55" class="sub" font-weight="600">SOURCE TABLES</text>
  <g>
    <rect x="20" y="65" width="170" height="26" class="table"/>
    <text x="105" y="83" text-anchor="middle" font-size="10">intel_cve_cache (1685)</text>
    <rect x="20" y="95" width="170" height="26" class="table"/>
    <text x="105" y="113" text-anchor="middle" font-size="10">intel_exploit_cache</text>
    <rect x="20" y="125" width="170" height="26" class="table"/>
    <text x="105" y="143" text-anchor="middle" font-size="10">intel_news_cache</text>
    <rect x="20" y="155" width="170" height="26" class="table"/>
    <text x="105" y="173" text-anchor="middle" font-size="10">intel_paste_posts</text>
    <rect x="20" y="185" width="170" height="26" class="table"/>
    <text x="105" y="203" text-anchor="middle" font-size="10">intel_stealer_logs</text>
    <rect x="20" y="215" width="170" height="26" class="table"/>
    <text x="105" y="233" text-anchor="middle" font-size="10">intel_combolist_drops</text>
    <rect x="20" y="245" width="170" height="26" class="table"/>
    <text x="105" y="263" text-anchor="middle" font-size="10">intel_compromised_hosts</text>
    <rect x="20" y="275" width="170" height="26" class="table"/>
    <text x="105" y="293" text-anchor="middle" font-size="10">intel_ransomware_*</text>
    <rect x="20" y="305" width="170" height="26" class="table"/>
    <text x="105" y="323" text-anchor="middle" font-size="10">intel_darknet_posts</text>
    <rect x="20" y="335" width="170" height="26" class="table"/>
    <text x="105" y="353" text-anchor="middle" font-size="10">intel_actor_cve_links</text>
    <rect x="20" y="365" width="170" height="26" class="table"/>
    <text x="105" y="383" text-anchor="middle" font-size="10">intel_actor_breach_links</text>
    <rect x="20" y="395" width="170" height="26" class="table"/>
    <text x="105" y="413" text-anchor="middle" font-size="10">intel_mitre_groups</text>
  </g>

  <!-- Three anchor passes (middle) -->
  <text x="380" y="55" text-anchor="middle" class="sub" font-weight="600">THREE PARALLEL ANCHOR PASSES</text>

  <rect x="280" y="80" width="200" height="80" class="anchor"/>
  <text x="380" y="105" text-anchor="middle" class="label-w" font-size="13">runCvePass</text>
  <text x="380" y="125" text-anchor="middle" class="label-w" font-size="9">cluster_type = cve</text>
  <text x="380" y="142" text-anchor="middle" class="label-w" font-size="9">key = cve:CVE-yyyy-nnnn</text>

  <rect x="280" y="190" width="200" height="80" class="anchor"/>
  <text x="380" y="215" text-anchor="middle" class="label-w" font-size="13">runActorPass</text>
  <text x="380" y="235" text-anchor="middle" class="label-w" font-size="9">cluster_type = actor</text>
  <text x="380" y="252" text-anchor="middle" class="label-w" font-size="9">key = actor:&lt;name&gt;</text>

  <rect x="280" y="300" width="200" height="80" class="anchor"/>
  <text x="380" y="325" text-anchor="middle" class="label-w" font-size="13">runRansomwarePass</text>
  <text x="380" y="345" text-anchor="middle" class="label-w" font-size="9">cluster_type = ransomware</text>
  <text x="380" y="362" text-anchor="middle" class="label-w" font-size="9">key = rans:&lt;slug&gt;</text>

  <!-- Signal types (right) -->
  <text x="600" y="55" text-anchor="middle" class="sub" font-weight="600">11 SIGNAL TYPES</text>
  <g>
    <rect x="510" y="65" width="190" height="22" class="signal"/>
    <text x="605" y="80" text-anchor="middle" font-size="9">kev (w 12)</text>
    <rect x="510" y="92" width="190" height="22" class="signal"/>
    <text x="605" y="107" text-anchor="middle" font-size="9">exploit (w 14)</text>
    <rect x="510" y="119" width="190" height="22" class="signal"/>
    <text x="605" y="134" text-anchor="middle" font-size="9">ransomware_victim (w 13)</text>
    <rect x="510" y="146" width="190" height="22" class="signal"/>
    <text x="605" y="161" text-anchor="middle" font-size="9">actor_link (w 11)</text>
    <rect x="510" y="173" width="190" height="22" class="signal"/>
    <text x="605" y="188" text-anchor="middle" font-size="9">compromised_host (w 9)</text>
    <rect x="510" y="200" width="190" height="22" class="signal"/>
    <text x="605" y="215" text-anchor="middle" font-size="9">darknet_post (w 9)</text>
    <rect x="510" y="227" width="190" height="22" class="signal"/>
    <text x="605" y="242" text-anchor="middle" font-size="9">stealer_log (w 8)</text>
    <rect x="510" y="254" width="190" height="22" class="signal"/>
    <text x="605" y="269" text-anchor="middle" font-size="9">combolist (w 7)</text>
    <rect x="510" y="281" width="190" height="22" class="signal"/>
    <text x="605" y="296" text-anchor="middle" font-size="9">paste (w 6)</text>
    <rect x="510" y="308" width="190" height="22" class="signal"/>
    <text x="605" y="323" text-anchor="middle" font-size="9">news (w 4)</text>
    <rect x="510" y="335" width="190" height="22" class="signal"/>
    <text x="605" y="350" text-anchor="middle" font-size="9">related_cve (w 3)</text>
  </g>

  <!-- Arrows source → anchors -->
  <line x1="190" y1="78" x2="280" y2="100" class="arrow"/>
  <line x1="190" y1="108" x2="280" y2="115" class="arrow"/>
  <line x1="190" y1="138" x2="280" y2="125" class="arrow"/>
  <line x1="190" y1="168" x2="280" y2="135" class="arrow"/>
  <line x1="190" y1="198" x2="280" y2="145" class="arrow"/>
  <line x1="190" y1="288" x2="280" y2="320" class="arrow"/>
  <line x1="190" y1="318" x2="280" y2="350" class="arrow"/>
  <line x1="190" y1="348" x2="280" y2="220" class="arrow"/>
  <line x1="190" y1="378" x2="280" y2="240" class="arrow"/>
  <line x1="190" y1="408" x2="280" y2="260" class="arrow"/>

  <!-- Arrows anchors → signals -->
  <line x1="480" y1="115" x2="510" y2="76" class="arrow"/>
  <line x1="480" y1="120" x2="510" y2="103" class="arrow"/>
  <line x1="480" y1="125" x2="510" y2="184" class="arrow"/>
  <line x1="480" y1="130" x2="510" y2="319" class="arrow"/>
  <line x1="480" y1="135" x2="510" y2="346" class="arrow"/>
  <line x1="480" y1="225" x2="510" y2="157" class="arrow"/>
  <line x1="480" y1="232" x2="510" y2="130" class="arrow"/>
  <line x1="480" y1="335" x2="510" y2="265" class="arrow"/>
  <line x1="480" y1="340" x2="510" y2="211" class="arrow"/>

  <!-- Output cluster -->
  <text x="380" y="450" text-anchor="middle" class="sub" font-weight="600">SCORED + UPSERTED INTO</text>
  <rect x="180" y="465" width="400" height="90" class="cluster"/>
  <text x="380" y="490" text-anchor="middle" class="label" font-size="13">intel_correlation_clusters</text>
  <text x="380" y="510" text-anchor="middle" class="sub">UNIQUE on cluster_key · idempotent re-runs</text>
  <text x="380" y="525" text-anchor="middle" class="sub">+ confidence (20-99) · related_cves · anchor_actor · anchor_ransomware</text>
  <text x="380" y="540" text-anchor="middle" class="sub">score = base + Σ (weight · conf · decay) where decay = max(0.4, 2^(−age/60))</text>

  <line x1="380" y1="380" x2="380" y2="465" class="arrow-out"/>

  <!-- Bottom note -->
  <text x="380" y="590" text-anchor="middle" class="sub" font-weight="600">RESULT ON DEMO DATA</text>
  <text x="380" y="608" text-anchor="middle" class="sub">v1: 80 clusters, all CVE-only, avg 2 signals, 1 distinct signal type</text>
  <text x="380" y="624" text-anchor="middle" class="sub">v2: 176 clusters across 3 anchor types, avg 2.91 signals,</text>
  <text x="380" y="640" text-anchor="middle" class="sub">8 distinct signal types, top cluster has 17 signals</text>
  <text x="380" y="660" text-anchor="middle" class="sub">+120% clusters · +45% density · +700% signal-type diversity</text>

  <text x="380" y="700" text-anchor="middle" class="sub">All passwords stored as &lt;REDACTED:length&gt; placeholders.  No raw credentials are persisted.</text>
</svg>
